<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Add User</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <h1>
            <i class="fas fa-user-plus"></i>
            Add New User
        </h1>
        <form class="myForm" id="userForm">
            <div class="inputGroup">
                <label for="fname">First Name:</label>
                <input type="text" id="fname" placeholder="your first name" required maxlength="25">
            </div>
            <div class="inputGroup">
                <label for="lname">Last Name:</label>
                <input type="text" id="lname" placeholder="your last name" required maxlength="25">
            </div>
            <div class="inputGroup">
                <label for="age">Your Age:</label>
                <input type="number" id="age" placeholder="your age" required min="1" max="110">
            </div>
            <div class="inputGroup">
                <label for="isGraduated">Graduated?</label>
                <select id="isGraduated">
                    <option value="Yes" selected>Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            <button type="submit" class="btn-add" id="addUser-btn">
                <i class="fas fa-plus-circle"></i>
                Add User
            </button>
        </form>
        <div class="nav-buttons">
            <a href="searchUsers.html" class="btn-nav btn-search">
                <i class="fas fa-search"></i> Search Users
            </a>
            <a href="modifyUsers.html" class="btn-nav btn-modify">
                <i class="fas fa-edit"></i> Modify Users
            </a>
        </div>
    </div>
    <script src = "addUser.js"></script>
</body>

</html>
