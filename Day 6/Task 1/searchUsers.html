<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width: device-width , initial-scale = 1.0">
    <title>Search Users</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <h1>
            <i class="fas fa-search"></i>
            Search Users
        </h1>
        <div class="search-container">
            <div class="search-row">
                <div class="input-group search-input">
                    <label for="searchName"><i class="fas fa-user"></i> Search by Name</label>
                    <input type="text" id="searchName" placeholder="first or last name" />
                </div>
                <div class="input-group search-input">
                    <label for="searchGraduated"><i class="fas fa-graduation-cap"></i> Graduated?</label>
                    <select id="searchGraduated">
                        <option value="all" selected>All Users</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <button class="btn-search-action" id="searchBtn">
                    <i class="fas fa-search"></i> SEARCH
                </button>
                <button class="btn-clear" id="clearBtn">
                    <i class="fas fa-undo"></i> Clear
                </button>
            </div>
        </div>
        <div class="table-search">
            <table id="userTable">
                <thead>
                    <tr>
                        <th>FNAME</th>
                        <th>LNAME</th>
                        <th>AGE</th>
                        <th>ISGRADUATED</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="nav-buttons">
            <a href="addUser.html" class="btn-nav btn-add-user">
                <i class="fas fa-plus-circle"></i>
                Add User
            </a>
            <a href="modifyUsers.html" class="btn-nav btn-modify">
                <i class="fas fa-edit"></i>
                Modify Users
            </a>
        </div>
    </div>
    <script src="searchUsers.js"></script>
</body>

</html>
